<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
body {
  width:1080px; min-height:1440px;
  font-family: "JetBrains Mono","Cascadia Code","SF Mono","Menlo","Consolas",monospace;
  background:#0B0D11; padding:0;
}
.titlebar {
  background:#13161B; height:48px; display:flex; align-items:center;
  padding:0 24px; border-bottom:1px solid #1E2228;
}
.dot { width:13px; height:13px; border-radius:50%; margin-right:9px }
.d1 { background:#FF5F56 } .d2 { background:#FFBD2E } .d3 { background:#27CA40 }
.tname {
  flex:1; text-align:center; font-size:18px; color:#5A5D65;
  font-family: "PingFang SC","Microsoft YaHei",sans-serif; margin-right:48px;
}
.body { padding:52px 44px }
.line { font-size:23px; line-height:1.85 }
.prompt { color:#845EF7 }
.cmd { color:#E4E4E6 }
.arg { color:#FCC419 }
.flag { color:#3BC9DB }
.cmt { color:#5A5D65; font-style:italic }
.out { color:#40C057 }
.err { color:#FF6B6B }
.path { color:#FF922B }
.str { color:#A5D6FF }
</style>
</head>
<body>
  <div class="titlebar">
    <div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div>
    <div class="tname">{TERMINAL_TITLE}</div>
  </div>
  <div class="body">{LINES}</div>
</body>
</html>
