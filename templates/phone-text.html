<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
body {
  width:750px; height:1000px;
  font-family: "PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#090A0C; display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:60px;
}
.phone {
  width:420px; background:#131418; border:1px solid #22242B; border-radius:36px;
  padding:52px 40px;
}
.phdr { font-size:22px; color:#787A80; margin-bottom:36px; text-align:center }
.msg { margin-bottom:28px }
.mtxt {
  display:inline-block; background:#1E1F25; border-radius:20px;
  padding:20px 24px; font-size:28px; color:#C4C4C8; line-height:1.5; max-width:100%;
}
.mr { text-align:right }
.mr .mtxt { background:linear-gradient(135deg,#3BC9DB,#845EF7); color:#fff }
.emoji-big { font-size:52px; text-align:center; margin:28px 0 }
.link-preview {
  background:#1E1F25; border-radius:14px; padding:22px; margin-top:16px;
  font-size:24px; color:#787A80;
}
.link-title { font-size:26px; font-weight:700; color:#E4E4E6; margin-bottom:8px }
.caption { font-size:22px; color:#787A80; text-align:center; margin-top:48px }
</style>
</head>
<body>
  <div class="phone">
    <div class="phdr">{CONTEXT}</div>
    {MESSAGES}
  </div>
  <div class="caption">{CAPTION}</div>
</body>
</html>
