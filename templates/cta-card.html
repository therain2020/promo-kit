<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
body {
  width:750px; height:1000px;
  font-family: "PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#090A0C; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:80px 60px;
  position:relative; overflow:hidden;
}
body::before {
  content:""; position:absolute; top:-160px; left:50%; transform:translateX(-50%);
  width:600px; height:600px; border-radius:50%;
  background:radial-gradient(circle,rgba(59,201,219,0.06) 0%,transparent 70%);
}
.pname { font-size:28px; color:#787A80; margin-bottom:32px; position:relative; z-index:1 }
.stars { font-size:42px; letter-spacing:6px; margin-bottom:40px; position:relative; z-index:1 }
.tagline { font-size:32px; color:#C4C4C8; text-align:center; margin-bottom:60px; line-height:1.5; position:relative; z-index:1; max-width:520px }
.btn {
  background:linear-gradient(135deg,#3BC9DB,#845EF7); color:#fff;
  font-size:32px; font-weight:700; padding:28px 72px; border-radius:48px;
  text-align:center; box-shadow:0 0 48px rgba(59,201,219,0.2);
  position:relative; z-index:1; margin-bottom:48px;
}
.url {
  font-family: "JetBrains Mono","Cascadia Code","SF Mono",monospace;
  font-size:24px; color:#787A80; text-align:center; margin-bottom:40px; position:relative; z-index:1;
}
.fs { display:flex; gap:16px; position:relative; z-index:1 }
.f {
  background:rgba(255,255,255,0.03); border:1px solid #22242B;
  border-radius:12px; padding:18px 22px; color:#787A80; font-size:22px; text-align:center;
}
</style>
</head>
<body>
  <div class="pname">{PROJECT}</div>
  <div class="stars">{STARS}</div>
  <div class="tagline">{TAGLINE}</div>
  <div class="btn">{CTA_TEXT}</div>
  <div class="url">{URL}</div>
  <div class="fs">{FEATURES}</div>
</body>
</html>
