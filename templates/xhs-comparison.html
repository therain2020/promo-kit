<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
body {
  width:1080px; min-height:1440px;
  font-family: "PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#090A0C; padding:100px 88px;
}
.num {
  font-family: "JetBrains Mono","Cascadia Code","SF Mono",monospace;
  font-size:22px; color:#845EF7; letter-spacing:2px; margin-bottom:32px;
}
.headline {
  font-family: Georgia,"Noto Serif CJK SC","STSong","SimSun",serif;
  font-size:60px; font-weight:700; color:#E4E4E6; line-height:1.18; margin-bottom:56px;
}
.table { width:100%; border-radius:16px; overflow:hidden; border:1px solid #22242B }
.row { display:flex; border-bottom:1px solid #1E1F25 }
.row:last-child { border-bottom:none }
.cell { flex:1; padding:28px 22px; font-size:28px; line-height:1.45; text-align:center; color:#C4C4C8 }
.cell:first-child { text-align:left; color:#787A80; font-weight:500; font-size:26px }
.hdr .cell { background:#131418; font-weight:600; color:#787A80; font-size:24px; text-transform:uppercase; letter-spacing:1px }
.win { background:rgba(64,192,87,0.08); color:#40C057; font-weight:600 }
.lose { color:#787A80 }
.chk { font-size:28px }
.note { font-size:24px; color:#787A80; text-align:center; margin-top:40px; line-height:1.6 }
</style>
</head>
<body>
  <div class="num">{SECTION_NUM}</div>
  <div class="headline">{HEADLINE}</div>
  <div class="table">{ROWS}</div>
  <div class="note">{NOTE}</div>
</body>
</html>
