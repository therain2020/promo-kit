<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
body {
  width:750px; min-height:1000px;
  font-family: "PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#090A0C; padding:80px 48px;
}
h1 {
  font-family: Georgia,"Noto Serif CJK SC","STSong","SimSun",serif;
  font-size:42px; font-weight:700; color:#E4E4E6; text-align:center; margin-bottom:56px;
}
.diagram { display:flex; flex-direction:column; align-items:center; gap:18px }
.box {
  background:#131418; border:1px solid #22242B; border-radius:18px;
  padding:28px 36px; width:100%; max-width:580px; text-align:center;
}
.btitle { font-size:30px; font-weight:700; color:#E4E4E6; margin-bottom:10px }
.bdesc { font-size:24px; color:#787A80; line-height:1.5 }
.bhl { border-color:#3BC9DB; background:rgba(59,201,219,0.04) }
.bhl .btitle { color:#3BC9DB }
.bpurple { border-color:#845EF7; background:rgba(132,94,247,0.04) }
.bpurple .btitle { color:#845EF7 }
.arrow { display:flex; flex-direction:column; align-items:center; gap:4px }
.al { width:2px; height:22px; background:#22242B }
.ad { font-size:22px; color:#3D4047 }
.label {
  font-size:18px; color:#787A80; margin:-6px 0; background:#090A0C; padding:0 16px; position:relative; z-index:1;
}
</style>
</head>
<body>
  <h1>{DIAGRAM_TITLE}</h1>
  <div class="diagram">{BLOCKS}</div>
</body>
</html>
