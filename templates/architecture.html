<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 750px; min-height: 1000px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #FFFFFF; padding: 80px 50px;
}
h1 { font-size: 40px; font-weight: 700; color: #1A1A1A; text-align: center; margin-bottom: 56px; }
.diagram { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.box {
  background: #F8F8F8; border: 2px solid #E0E0E0; border-radius: 16px;
  padding: 28px 36px; width: 100%; max-width: 580px; text-align: center;
}
.box-title { font-size: 30px; font-weight: 600; color: #1A1A1A; margin-bottom: 12px; }
.box-desc { font-size: 24px; color: #666666; line-height: 1.5; }
.box-highlight { border-color: #FF2442; background: #FFF5F5; }
.box-highlight .box-title { color: #FF2442; }
.arrow {
  display: flex; align-items: center; gap: 8px; font-size: 28px; color: #999999;
}
.arrow-line { width: 2px; height: 24px; background: #CCCCCC; }
.arrow-down { font-size: 24px; color: #CCCCCC; }
.label {
  position: relative; font-size: 20px; color: #999999; margin: -8px 0;
  background: #FFFFFF; padding: 0 16px;
}
</style>
</head>
<body>
  <h1>{DIAGRAM_TITLE}</h1>
  <div class="diagram">
    {BLOCKS}
  </div>
</body>
</html>
