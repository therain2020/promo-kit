<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
body {
  width:1080px; min-height:1440px;
  font-family: "PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#090A0C; padding:100px 88px;
}
.num {
  font-family: "JetBrains Mono","Cascadia Code","SF Mono",monospace;
  font-size:22px; color:#845EF7; letter-spacing:2px; margin-bottom:32px;
}
.headline {
  font-family: Georgia,"Noto Serif CJK SC","STSong","SimSun",serif;
  font-size:72px; font-weight:700; color:#E4E4E6; line-height:1.18; margin-bottom:24px;
}
.desc { font-size:34px; color:#787A80; line-height:1.55; margin-bottom:64px }
.emoji-big { font-size:100px; margin-bottom:56px; display:block }
.pains { display:flex; flex-direction:column; gap:22px }
.pain {
  display:flex; align-items:flex-start; gap:24px;
  background:#131418; border:1px solid #22242B; border-radius:18px; padding:36px;
  border-left:4px solid #FF6B6B;
}
.pain-icon { font-size:40px; min-width:48px; text-align:center }
.pain-text { font-size:32px; color:#C4C4C8; line-height:1.45; font-weight:500 }
</style>
</head>
<body>
  <div class="num">{SECTION_NUM}</div>
  <div class="emoji-big">{EMOJI}</div>
  <div class="headline">{HEADLINE}</div>
  <div class="desc">{DESC}</div>
  <div class="pains">{PAIN_ITEMS}</div>
</body>
</html>
