<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
body {
  width:1080px; height:1440px; overflow:hidden;
  font-family: "PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#090A0C;
  position:relative;
}
body::before {
  content:""; position:absolute; inset:0; opacity:0.04; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px 256px;
}
.wrap { position:relative; z-index:1; padding:120px 88px; height:100%; display:flex; flex-direction:column; }
.brow {
  font-family: "JetBrains Mono","Cascadia Code","SF Mono",monospace;
  font-size:24px; color:#3BC9DB; letter-spacing:3px; margin-bottom:40px;
}
.title {
  font-family: Georgia,"Noto Serif CJK SC","STSong","SimSun",serif;
  font-size:104px; font-weight:700; color:#E4E4E6; line-height:1.12;
  letter-spacing:-1px; margin-bottom:36px;
}
.tagline {
  font-size:38px; color:#787A80; line-height:1.5; max-width:760px; font-weight:400;
  border-left:3px solid #845EF7; padding-left:28px;
}
.spacer { flex:1 }
.emoji-hero { font-size:140px; opacity:0.9; align-self:flex-end; margin-bottom:-20px }
.bottom {
  display:flex; align-items:center; justify-content:space-between;
  border-top:1px solid #22242B; padding-top:32px;
}
.bottom-label { font-size:26px; color:#787A80; letter-spacing:1px }
.bottom-cta { font-size:28px; color:#3BC9DB; font-weight:600 }
</style>
</head>
<body>
<div class="wrap">
  <div class="brow">{PROJECT}</div>
  <div class="title">{TITLE}</div>
  <div class="tagline">{TAGLINE}</div>
  <div class="spacer"></div>
  <div class="emoji-hero">{EMOJI}</div>
  <div class="bottom">
    <span class="bottom-label">OPEN SOURCE</span>
    <span class="bottom-cta">GitHub →</span>
  </div>
</div>
</body>
</html>
