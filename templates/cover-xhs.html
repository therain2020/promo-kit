<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 750px; height: 1000px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #FF2442 0%, #FF6B6B 50%, #FF8E8E 100%);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 80px 60px; overflow: hidden;
}
.project { font-size: 28px; color: rgba(255,255,255,0.8); margin-bottom: 24px; letter-spacing: 2px; }
.title {
  font-size: 52px; font-weight: 700; color: #FFFFFF; text-align: center;
  line-height: 1.3; margin-bottom: 40px; text-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.tagline { font-size: 28px; color: rgba(255,255,255,0.85); text-align: center; line-height: 1.6; }
.emoji { font-size: 72px; margin-bottom: 20px; }
.footer { position: absolute; bottom: 60px; font-size: 22px; color: rgba(255,255,255,0.5); }
</style>
</head>
<body>
  <div class="emoji">{EMOJI}</div>
  <div class="project">{PROJECT}</div>
  <div class="title">{TITLE}</div>
  <div class="tagline">{TAGLINE}</div>
  <div class="footer">开源项目 · 点击查看详情</div>
</body>
</html>
