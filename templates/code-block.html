<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 750px; min-height: 1000px;
  font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", "SF Mono", "Menlo", "Consolas", monospace;
  background: #0D1117; padding: 0;
}
.titlebar {
  background: #161B22; height: 44px; display: flex; align-items: center;
  padding: 0 20px; border-bottom: 1px solid #30363D;
}
.dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
.dot-r { background: #FF5F56; }
.dot-y { background: #FFBD2E; }
.dot-g { background: #27CA40; }
.filename {
  flex: 1; text-align: center; font-size: 18px; color: #8B949E;
  font-family: -apple-system, sans-serif; margin-right: 40px;
}
.content { padding: 44px 40px; }
pre { margin: 0; }
code { font-size: 23px; line-height: 1.85; color: #C9D1D9; }
.line-num { color: #484F58; user-select: none; margin-right: 20px; font-size: 21px; }
.highlight { background: rgba(255,255,255,0.06); display: block; margin: 0 -40px; padding: 0 40px; }
.kw { color: #FF7B72; }
.fn { color: #D2A8FF; }
.str { color: #A5D6FF; }
.num { color: #79C0FF; }
.cm { color: #8B949E; font-style: italic; }
.ty { color: #FFA657; }
.op { color: #FF7B72; }
</style>
</head>
<body>
  <div class="titlebar">
    <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
    <div class="filename">{FILENAME}</div>
  </div>
  <div class="content">
    <pre><code>{CODE}</code></pre>
  </div>
</body>
</html>
