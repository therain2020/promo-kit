<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
body {
  width:750px; min-height:1000px;
  font-family: "PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#090A0C; padding:80px 48px;
}
h1 {
  font-family: Georgia,"Noto Serif CJK SC","STSong","SimSun",serif;
  font-size:42px; font-weight:700; color:#E4E4E6; text-align:center; margin-bottom:56px;
}
.step { display:flex; align-items:flex-start; margin-bottom:36px; gap:20px }
.n {
  width:56px; height:56px; min-width:56px; border-radius:50%;
  background:linear-gradient(135deg,#3BC9DB,#845EF7);
  color:#fff; font-size:28px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
  font-family: "JetBrains Mono","Cascadia Code","SF Mono",monospace;
}
.sbody { flex:1; padding-top:4px }
.stitle { font-size:30px; font-weight:700; color:#E4E4E6; margin-bottom:6px }
.sdesc { font-size:24px; color:#787A80; line-height:1.55 }
.conn { width:2px; height:28px; background:#22242B; margin-left:27px; margin-top:0 }
</style>
</head>
<body>
  <h1>{SECTION_TITLE}</h1>
  {STEPS}
</body>
</html>
