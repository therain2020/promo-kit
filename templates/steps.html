<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=750, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 750px; min-height: 1000px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #FFFFFF; padding: 80px 50px;
}
h1 { font-size: 40px; font-weight: 700; color: #1A1A1A; text-align: center; margin-bottom: 56px; }
.step { display: flex; align-items: flex-start; margin-bottom: 40px; }
.num {
  width: 64px; height: 64px; min-width: 64px; border-radius: 50%;
  background: #FF2442; color: #FFFFFF; font-size: 32px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; margin-right: 24px;
}
.step-content { flex: 1; padding-top: 8px; }
.step-title { font-size: 30px; font-weight: 600; color: #1A1A1A; margin-bottom: 8px; }
.step-desc { font-size: 24px; color: #666666; line-height: 1.6; }
.connector { width: 2px; height: 32px; background: #EEEEEE; margin-left: 31px; margin-bottom: 0; }
</style>
</head>
<body>
  <h1>{SECTION_TITLE}</h1>
  {STEPS}
</body>
</html>
