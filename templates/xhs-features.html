<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
body {
  width:1080px; min-height:1440px;
  font-family: "PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#090A0C; padding:100px 88px;
}
.num {
  font-family: "JetBrains Mono","Cascadia Code","SF Mono",monospace;
  font-size:22px; color:#3BC9DB; letter-spacing:2px; margin-bottom:32px;
}
.headline {
  font-family: Georgia,"Noto Serif CJK SC","STSong","SimSun",serif;
  font-size:68px; font-weight:700; color:#E4E4E6; line-height:1.18; margin-bottom:60px;
}
.feats { display:flex; flex-direction:column; gap:28px }
.feat {
  background:#131418; border:1px solid #22242B; border-radius:20px; padding:44px;
  display:flex; gap:28px; align-items:flex-start;
}
.feat-num {
  width:68px; height:68px; min-width:68px; border-radius:18px;
  background:linear-gradient(135deg,#3BC9DB,#845EF7);
  color:#fff; font-size:32px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
  font-family: "JetBrains Mono","Cascadia Code","SF Mono",monospace;
}
.feat-body { flex:1 }
.feat-title { font-size:36px; font-weight:700; color:#E4E4E6; margin-bottom:10px }
.feat-desc { font-size:28px; color:#787A80; line-height:1.55 }
</style>
</head>
<body>
  <div class="num">{SECTION_NUM}</div>
  <div class="headline">{HEADLINE}</div>
  <div class="feats">{FEATURES}</div>
</body>
</html>
